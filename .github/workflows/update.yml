name: Update M3U FAST

on:
  schedule:
    - cron: '0 * * * *'   # chạy mỗi 1 giờ (đủ nhanh + không bị block)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # ⚡ giảm timeout vì code đã tối ưu nhanh

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip (tăng tốc)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: |
          python bongda.py   # ⚠️ đổi nếu tên file khác

      - name: Commit & Push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add tv.m3u full.m3u

          # chỉ commit khi có thay đổi
          git diff --cached --quiet || git commit -m "update m3u fast"

          git push
