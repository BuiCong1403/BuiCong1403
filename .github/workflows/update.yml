name: Update M3U

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests beautifulsoup4

      - run: python bongda.py   # ⚠️ sửa đúng tên file ở đây

      - name: Commit file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add bongda.m3u
          git commit -m "update m3u" || echo "no change"
          git push
